steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - build
    - -t
    - europe-west1-docker.pkg.dev/miros-openclaw/agent-search/frontend:latest
    - --build-arg
    - NEXT_PUBLIC_API_URL=https://agent-search-backend-osl3yrpyoa-ew.a.run.app
    - ./frontend

- name: 'gcr.io/cloud-builders/docker'
  args:
    - push
    - europe-west1-docker.pkg.dev/miros-openclaw/agent-search/frontend:latest

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - run
    - deploy
    - agent-search-frontend
    - --image=europe-west1-docker.pkg.dev/miros-openclaw/agent-search/frontend:latest
    - --region=europe-west1
    - --platform=managed
    - --memory=512Mi
    - --cpu=1
    - --min-instances=0
    - --max-instances=3
    - --port=3000
    - --project=miros-openclaw
    - --quiet

images:
  - europe-west1-docker.pkg.dev/miros-openclaw/agent-search/frontend:latest

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
