steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - build
    - -t
    - europe-west1-docker.pkg.dev/miros-openclaw/agent-search/backend:latest
    - ./backend

- name: 'gcr.io/cloud-builders/docker'
  args:
    - push
    - europe-west1-docker.pkg.dev/miros-openclaw/agent-search/backend:latest

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - run
    - deploy
    - agent-search-backend
    - --image=europe-west1-docker.pkg.dev/miros-openclaw/agent-search/backend:latest
    - --region=europe-west1
    - --platform=managed
    - --memory=1Gi
    - --cpu=1
    - --min-instances=0
    - --max-instances=3
    - --timeout=300
    - --set-env-vars=DATABASE_URL=sqlite:////tmp/agent_search.db
    - --project=miros-openclaw
    - --quiet

images:
  - europe-west1-docker.pkg.dev/miros-openclaw/agent-search/backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
