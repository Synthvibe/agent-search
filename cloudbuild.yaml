steps:
  # Build backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/agent-search-backend:$COMMIT_SHA
      - ./backend

  # Push backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/agent-search-backend:$COMMIT_SHA

  # Build frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/agent-search-frontend:$COMMIT_SHA
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://agent-search-backend-HASH-uc.a.run.app
      - ./frontend

  # Push frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/agent-search-frontend:$COMMIT_SHA

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - agent-search-backend
      - --image=gcr.io/$PROJECT_ID/agent-search-backend:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - agent-search-frontend
      - --image=gcr.io/$PROJECT_ID/agent-search-frontend:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi

images:
  - gcr.io/$PROJECT_ID/agent-search-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/agent-search-frontend:$COMMIT_SHA
